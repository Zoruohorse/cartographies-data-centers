<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Cartographie Interactive — Nuage Relationnel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="data-projet.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f8fafc; color: #0f172a; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px 20px; background: #0f172a; color: white; }
        header h1 { margin: 0; font-size: 20px; }
        #wrap { display: flex; flex: 1; overflow: hidden; }
        aside, #details { width: 300px; background: white; padding: 20px; overflow-y: auto; box-shadow: 0 0 10px rgba(0,0,0,0.05); z-index: 10; }
        #chart { flex: 1; position: relative; overflow: hidden; cursor: grab; }
        svg { width: 100%; height: 100%; display: block; }
        
        /* Contrôles et Textes */
        input[type="text"] { width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 6px 10px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: #fff; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; vertical-align: middle; }
        label { display: block; margin: 8px 0; font-size: 13px; cursor: pointer; }
        .pill { display: inline-block; padding: 4px 8px; border-radius: 12px; color: white; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        .tooltip { position: absolute; background: #0f172a; color: white; padding: 5px 10px; border-radius: 4px; font-size: 12px; opacity: 0; pointer-events: none; transform: translate(-50%, -120%); }
        
        /* Graphe SVG */
        .node circle { stroke: #fff; stroke-width: 2px; }
        .node text { font-size: 11px; font-weight: bold; fill: #0f172a; text-anchor: middle; pointer-events: none; stroke: #fff; stroke-width: 3px; paint-order: stroke; }
        .link { stroke: #94a3b8; stroke-width: 1.5; opacity: 0.5; }
        .node.dim, .link.dim { opacity: 0.15; }
        .node.hidden, .link.hidden { display: none; }
        .selected circle { stroke: #0f172a; stroke-width: 3px; }
    </style>
</head>
<body>

<header>
    <h1 id="main-title">Cartographie Interactive</h1>
</header>

<div id="wrap">
    <aside>
        <input id="search" type="text" placeholder="Rechercher un acteur...">
        <div style="margin-bottom: 15px;">
            <button id="reset">Réinitialiser</button>
            <button id="center">Recentrer</button>
        </div>
        <strong>Filtres</strong>
        <div id="checks"></div>
        <p id="count" style="font-size: 12px; color: #666;"></p>
    </aside>
    
    <main id="chart">
        <div class="tooltip" id="tooltip"></div>
        <svg id="svg"></svg>
    </main>
    
    <section id="details">
        <h2 id="default-title">Sélection</h2>
        <p>Cliquez sur un acteur pour afficher ses détails.</p>
    </section>
</div>

<script>
// 1. GESTION DES DONNÉES (Correction des clés 'new_nodes' et 'new_links')
const rawData = typeof graphData !== 'undefined' ? graphData : { new_nodes: [], new_links: [] };
const nodesData = rawData.new_nodes || rawData.nodes || [];
const linksData = rawData.new_links || rawData.links || [];

const colors = {
    "Projet central": "#111827", "Noyau d’opposition local": "#16a34a", "Opposants / critiques nommément cités": "#dc2626",
    "Élus / acteurs institutionnels": "#2563eb", "Organisations agricoles / foncières": "#ca8a04",
    "Porteurs / institutions du projet": "#0d9488", "Porte-parole / entreprises associées": "#7c3aed",
    "Points de vigilance / griefs": "#f97316", "Médias / sources cités": "#64748b"
};

const centralNode = nodesData.find(n => n.group === "Projet central") || nodesData[0];
let centralId = centralNode ? centralNode.id : "";

const nodes = nodesData.map(d => Object.assign({}, d));
const nodeById = new Map(nodes.map(d => [d.id, d]));
const links = linksData.map(d => Object.assign({}, d, {source: nodeById.get(d.source), target: nodeById.get(d.target)})).filter(d => d.source && d.target);

// 2. INITIALISATION SVG ET DOM
const svg = document.getElementById('svg');
const chart = document.getElementById('chart');
const details = document.getElementById('details');
const tooltip = document.getElementById('tooltip');
let width = chart.clientWidth, height = chart.clientHeight;
svg.setAttribute('viewBox', `0 0 ${width} ${height}`);

const ns = "http://www.w3.org/2000/svg";
const g = document.createElementNS(ns, 'g');
const linkG = document.createElementNS(ns, 'g');
const nodeG = document.createElementNS(ns, 'g');
svg.appendChild(g); g.appendChild(linkG); g.appendChild(nodeG);

// 3. GÉNÉRATION DES FILTRES
const activeGroups = new Set();
const groups = [...new Set(nodes.map(n => n.group))];
groups.forEach(gr => {
    activeGroups.add(gr);
    const label = document.createElement('label');
    label.innerHTML = `<input type="checkbox" checked value="${gr}"><span class="legend-dot" style="background:${colors[gr]||'#999'}"></span>${gr}`;
    document.getElementById('checks').appendChild(label);
});

document.getElementById('checks').addEventListener('change', e => {
    if(e.target.type === 'checkbox') {
        e.target.checked ? activeGroups.add(e.target.value) : activeGroups.delete(e.target.value);
        applyFilters();
    }
});

// 4. CRÉATION DES ÉLÉMENTS GRAPHIQUES
const linkEls = links.map(() => {
    const line = document.createElementNS(ns, 'line');
    line.classList.add('link');
    linkG.appendChild(line);
    return line;
});

const nodeEls = nodes.map(n => {
    const el = document.createElementNS(ns, 'g');
    el.classList.add('node'); el.dataset.id = n.id;
    
    const c = document.createElementNS(ns, 'circle');
    c.setAttribute('r', n.size || 15);
    c.setAttribute('fill', colors[n.group] || '#94a3b8');
    
    const t = document.createElementNS(ns, 'text');
    t.setAttribute('dy', (n.size || 15) + 12);
    t.textContent = n.label || n.id;
    
    el.appendChild(c); el.appendChild(t); nodeG.appendChild(el);
    
    el.addEventListener('click', () => selectNode(n));
    el.addEventListener('mouseenter', ev => { tooltip.textContent = n.id; tooltip.style.opacity = 1; });
    el.addEventListener('mousemove', ev => {
        const rect = chart.getBoundingClientRect();
        tooltip.style.left = (ev.clientX - rect.left) + 'px';
        tooltip.style.top = (ev.clientY - rect.top) + 'px';
    });
    el.addEventListener('mouseleave', () => tooltip.style.opacity = 0);
    drag(el, n);
    return el;
});

// 5. PHYSIQUE DU GRAPHE
nodes.forEach(n => { n.x = width/2 + (Math.random()-0.5)*200; n.y = height/2 + (Math.random()-0.5)*200; });

function tick() {
    links.forEach(l => {
        const dx = l.target.x - l.source.x, dy = l.target.y - l.source.y;
        const dist = Math.hypot(dx, dy) || 1;
        const f = (dist - 120) * 0.01;
        if(!l.source.fixed) { l.source.x += (dx/dist)*f; l.source.y += (dy/dist)*f; }
        if(!l.target.fixed) { l.target.x -= (dx/dist)*f; l.target.y -= (dy/dist)*f; }
    });
    
    for(let i=0; i<nodes.length; i++) for(let j=i+1; j<nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        const dx = b.x - a.x, dy = b.y - a.y, dist = Math.hypot(dx, dy) || 1;
        const min = (a.size||15) + (b.size||15) + 20;
        if(dist < min) {
            const f = (min - dist) / dist * 0.03;
            if(!a.fixed) { a.x -= dx * f; a.y -= dy * f; }
            if(!b.fixed) { b.x += dx * f; b.y += dy * f; }
        }
    }
    
    nodes.forEach(n => {
        if(!n.fixed) { n.x += (width/2 - n.x) * 0.002; n.y += (height/2 - n.y) * 0.002; }
    });
    
    linkEls.forEach((el, i) => {
        el.setAttribute('x1', links[i].source.x); el.setAttribute('y1', links[i].source.y);
        el.setAttribute('x2', links[i].target.x); el.setAttribute('y2', links[i].target.y);
    });
    nodeEls.forEach((el, i) => el.setAttribute('transform', `translate(${nodes[i].x},${nodes[i].y})`));
    
    requestAnimationFrame(tick);
}
tick();

// 6. INTERACTIONS ET RECHERCHE
function selectNode(n) {
    nodeEls.forEach(el => el.classList.remove('selected', 'dim'));
    linkEls.forEach(el => el.classList.remove('dim'));
    
    const neigh = new Set([n.id]);
    links.forEach(l => {
        if(l.source.id === n.id) neigh.add(l.target.id);
        if(l.target.id === n.id) neigh.add(l.source.id);
    });
    
    nodeEls.forEach(el => {
        if(!neigh.has(el.dataset.id)) el.classList.add('dim');
        if(el.dataset.id === n.id) el.classList.add('selected');
    });
    linkEls.forEach((el, i) => {
        if(links[i].source.id !== n.id && links[i].target.id !== n.id) el.classList.add('dim');
    });
    
    details.innerHTML = `<h2>${n.id}</h2>
        <span class="pill" style="background:${colors[n.group]||'#999'}">${n.group}</span>
        <p>${n.detail || 'Aucune description disponible.'}</p>
        <p style="font-size:13px; color:#666; margin-top:20px;"><strong>Connexions :</strong> ${[...neigh].filter(x => x !== n.id).join(', ') || 'aucune'}</p>`;
}

function applyFilters() {
    const q = document.getElementById('search').value.trim().toLowerCase();
    let visible = 0;
    nodeEls.forEach((el, i) => {
        const n = nodes[i];
        const ok = activeGroups.has(n.group) && (!q || (n.id + " " + n.detail).toLowerCase().includes(q));
        el.classList.toggle('hidden', !ok);
        if(ok) visible++;
    });
    linkEls.forEach((el, i) => {
        const sEl = nodeEls[nodes.indexOf(links[i].source)], tEl = nodeEls[nodes.indexOf(links[i].target)];
        el.classList.toggle('hidden', sEl.classList.contains('hidden') || tEl.classList.contains('hidden'));
    });
    document.getElementById('count').textContent = `${visible} nœud(s) affiché(s)`;
}

document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('reset').onclick = () => {
    document.getElementById('search').value = "";
    document.querySelectorAll('#checks input').forEach(cb => cb.checked = true);
    groups.forEach(gr => activeGroups.add(gr));
    nodeEls.forEach(el => el.classList.remove('selected', 'dim', 'hidden'));
    linkEls.forEach(el => el.classList.remove('dim', 'hidden'));
    currentZoom = 1; panX = 0; panY = 0; updateTransform();
    applyFilters();
};

document.getElementById('center').onclick = () => { currentZoom = 1; panX = 0; panY = 0; updateTransform(); };

function drag(el, n) {
    let down = false, ox = 0, oy = 0;
    el.addEventListener('pointerdown', ev => {
        down = true; n.fixed = true; el.setPointerCapture(ev.pointerId);
        const pt = toSvg(ev); ox = n.x - pt.x; oy = n.y - pt.y;
    });
    el.addEventListener('pointermove', ev => { if(down) { const pt = toSvg(ev); n.x = pt.x + ox; n.y = pt.y + oy; } });
    el.addEventListener('pointerup', ev => { down = false; el.releasePointerCapture(ev.pointerId); n.fixed = false; });
}

// 7. ZOOM ET PANORAMIQUE
let currentZoom = 1, panX = 0, panY = 0, panning = false, sx = 0, sy = 0;
function updateTransform() { g.setAttribute('transform', `translate(${panX},${panY}) scale(${currentZoom})`); }
function toSvg(ev) { const rect = svg.getBoundingClientRect(); return {x: (ev.clientX - rect.left - panX) / currentZoom, y: (ev.clientY - rect.top - panY) / currentZoom}; }

svg.addEventListener('wheel', ev => {
    ev.preventDefault();
    currentZoom = Math.max(0.3, Math.min(3, currentZoom * (ev.deltaY < 0 ? 1.1 : 0.9)));
    updateTransform();
});
svg.addEventListener('pointerdown', ev => { if(ev.target === svg) { panning = true; sx = ev.clientX - panX; sy = ev.clientY - panY; } });
svg.addEventListener('pointermove', ev => { if(panning) { panX = ev.clientX - sx; panY = ev.clientY - sy; updateTransform(); } });
svg.addEventListener('pointerup', () => panning = false);
window.addEventListener('resize', () => { width = chart.clientWidth; height = chart.clientHeight; svg.setAttribute('viewBox', `0 0 ${width} ${height}`); });
applyFilters();
</script>
</body>
</html>
